<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page.title | default: site.title | default: "Blog" }}</title>
    <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}" />
  </head>
  <body>
    <main class="markdown-body">
      {% unless page.url == "/" %}
      <nav class="back-link"><a href="{{ '/' | relative_url }}">&larr; back</a></nav>
      {% endunless %}
      {% if page.url == "/" %}
      <div class="c64-header">
        <div class="c64-boot-text">
          **** <a href="https://github.com/usize/basik" class="c64-link">BASIK</a> V2 ****
        </div>
        <div class="c64-program">
          <span class="c64-ready">READY.</span><br>
          <span id="c64-input" contenteditable="true" spellcheck="false">10 PRINT CHR$(205.5+RND(1)); : GOTO 10</span>
          <span class="c64-hint" id="c64-run">&#x21E7;&#x23CE;</span>
          <div id="c64-output"></div>
        </div>
      </div>
      <div class="crt-monitor">
        <div class="crt-bezel">
          <div class="crt-screen">
            <canvas id="c64-bg"></canvas>
          </div>
        </div>
        <div class="crt-badge">VIDEO MONITOR<br>MODEL 1701</div>
      </div>
      {% endif %}
      {{ content }}
    </main>
    <script src="{{ '/assets/basik-bundle.js' | relative_url }}"></script>
    <script src="{{ '/assets/c64.js' | relative_url }}"></script>
  </body>
</html>
